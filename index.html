<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1 class="title">Weather</h1>

        <div class = "tab-container">
            <p class="tab" data-userWeather>Your weather</p>
            <p class="tab" data-searchWeather>Search weather</p>
        </div>

    </div>
        <div class="weather-container">


            <div class="grant-location-container">
                <img src="./assets/location.png" width="80" height="80" loading="lazy">
                <p>grant location access</p> 
                <p>Allow access to grant weather information</p>
                <button class="btn" data-grantAccess>Grant Access</button>                
            </div>

            <form class="form-container" data-searchForm>
                <input  placeholder="Search for city...." data-searchInput>
                <button class="btn" type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>              
                </button>
            </form>

            <!-- LOADING SCREEN CONTAINER -->
            <div class="loading-container">
                <img src="./assets/loading.gif" width="200" height="150" loading="lazy">
                <p>Loading...</p>

            </div>

            <!-- show weather info container -->
             <div class="weather-info-container">

                <!-- city name anad flag -->
                <div class="cityName">  
                    <p data-cityName></p>
                    <img data-countryIcon>
                </div>
                
                <!-- weather discription -->
                <p data-weatherDesc></p>

                <!-- weather icon -->
                <img data-weatherIcon>

                <!-- temperature -->
                <p  data-temp></p>

                <!-- 3-cards parameter -->
                <div class="parameter-container">

                    <!-- card 1 -->
                    <div class="parameter">
                        <img src="./assets/wind.png" width="50" height="50">
                        <p>Wind speed</p>
                        <p data-windSpeed></p>
                    </div>

                    <!-- card 2 -->
                    <div class="parameter">
                        <img src="./assets/humidity.png" width="50" height="50">
                        <p>Humidity</p>
                        <p data-humidity></p>
                    </div>

                    <!-- card 3 -->
                    <div class="parameter">
                        <img src="./assets/cloudy.png" height="50" width="50">
                        <p>Clouds</p>
                        <p data-clouds></p>
                    </div>


                

        </div>

</div>
</div>
</div>

    <script src='index.js'></script>
</body>
</html>
